services:
  mysql:
    image: mysql:8.4
    container_name: fullstack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: ./backend
    container_name: fullstack-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_DIALECT: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword
      JWT_SECRET: sSaMiAkRuTmEaPrENCESTRACKER
      JWT_EXPIRE: 7d
      BCRYPT_ROUNDS: 10
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - mysql
    ports:
      - "5001:5000"

  frontend:
    build:
      context: ./frontend
    container_name: fullstack-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: fullstack-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: appuser
      PMA_PASSWORD: apppassword
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8080:80"

volumes:
  mysql_data:
